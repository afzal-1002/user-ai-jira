<div class="container mt-5 estimation-analysis-section">

  </div>

  <div class="row g-4 mt-1 justify-content-center analysis-cards">
    <div class="col-12 col-sm-10 col-md-6 col-lg-4 analysis-card-col">

        <div class="card-body text-center">
          <div class="mb-2">
            <img src="assets/image/ai-images/ai-02.png" alt="AI Estimations Analysis icon" style="width: 64px; height: 64px; object-fit: contain;" />

    <div class="col-12 col-sm-10 col-md-6 col-lg-4 analysis-card-col">
