<div class="container py-4 admin-assignment-wrap">
  <div class="card shadow-sm p-4">
    <h4>Assign Site To User</h4>
    <p class="text-muted small">Choose a user and a site, then assign access. Optionally set as default site for that user.</p>

    <div *ngIf="successMessage" class="alert alert-success py-2">{{ successMessage }}</div>
    <div *ngIf="errorMessage" class="alert alert-danger py-2">{{ errorMessage }}</div>

    <div *ngIf="isLoading" class="text-muted">Loading users and sites...</div>

    <form *ngIf="!isLoading" [formGroup]="assignmentForm" (ngSubmit)="assignSite()">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">User</label>
          <select class="form-select" formControlName="userId">
            <option [ngValue]="null">Select user</option>
            <option *ngFor="let user of users" [ngValue]="user.id">
              {{ user.userName }} ({{ user.firstName }} {{ user.lastName }})
            </option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Site</label>
          <select class="form-select" formControlName="siteId">
            <option [ngValue]="null">Select site</option>
            <option *ngFor="let site of sites" [ngValue]="site.id">
              {{ site.siteName }} ({{ site.baseUrl || site.hostPart }})
            </option>
          </select>
        </div>
      </div>

      <div class="form-check mt-3 mb-3">
        <input class="form-check-input" type="checkbox" id="defaultForUser" formControlName="defaultForUser" />
        <label class="form-check-label" for="defaultForUser">Set as default site for this user</label>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit" [disabled]="isAssigning">
          {{ isAssigning ? 'Assigning...' : 'Assign Site' }}
        </button>
        <button class="btn btn-outline-secondary" type="button" (click)="loadData()">Refresh</button>
      </div>
    </form>
  </div>
</div>
